<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <link rel="stylesheet" href="./assets/global.css">
    <link rel="stylesheet" href="./pages/estoque/estoque.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <h2>Estoque</h2>

            <button onclick="mostrarEstoque()">
                Estoque
            </button>

            <button onclick="abrirPagina('pages/vendas/vendas.html')">
                Vendas
            </button>

            <button onclick="abrirPagina('pages/historico/historico.html')">
                Histórico
            </button>
        </aside>

        <main class="conteudo">

            <div id="tela-estoque">
                <h1>Produtos em Estoque</h1>
                <button onclick="abrirModalProduto()">+ Adicionar Produto</button>
                
                <table>
                    <thead>
                        <tr>
                            <th>Imagem</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Qtd</th>
                            <th>Custo</th>
                            <th>Venda</th>
                            <th>Consignado</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="estoque-tabela">
                    </tbody>
                </table>
            </div>

            <iframe id="frame-pagina" src="" frameborder="0" style="display: none; width: 100%; height: 100%;"></iframe>

        </main>

    </div>

    <div id="modal-produto" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 400px; display: flex; flex-direction: column; gap: 10px; color: black;">
            <h3>Cadastrar Novo Produto</h3>
            
            <label>Nome do Produto</label>
            <input type="text" id="nome_produto">

            <label>Categoria</label>
            <input type="text" id="categoria_produto">

            <label>Quantidade em Estoque</label>
            <input type="number" id="quantidade_produto" value="0">

            <label>Preço de Custo</label>
            <input type="number" id="preco_custo_produto" step="0.01" value="0">

            <label>Preço de Venda</label>
            <input type="number" id="preco_venda_produto" step="0.01" value="0">

            <label>Preço Consignado</label>
            <input type="number" id="preco_consignado_produto" step="0.01" value="0">

            <label>Quantidade Mínima (Alerta)</label>
            <input type="number" id="quantidade_minima_produto" value="0">

            <label>URL da Imagem</label>
            <input type="text" id="imagem_produto" placeholder="http://...">

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="salvarProduto()" style="background: green; color: white; flex: 1; padding: 8px;">Salvar</button>
                <button onclick="fecharModalProduto()" style="background: red; color: white; flex: 1; padding: 8px;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        function abrirPagina(pagina) {
            document.getElementById('tela-estoque').style.display = 'none';
            const iframe = document.getElementById('frame-pagina');
            iframe.style.display = 'block';
            iframe.src = pagina;
        }

        function mostrarEstoque() {
            document.getElementById('frame-pagina').style.display = 'none';
            document.getElementById('tela-estoque').style.display = 'block';
            
            if (typeof carregarProdutos === 'function') {
                carregarProdutos();
            }
        }
    </script>

    <script src="./pages/estoque/estoque.js"></script>

</body>
</html>

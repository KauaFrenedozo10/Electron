<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Vendas</title>
    <style>
        .vendas-container { padding: 20px; font-family: Arial, sans-serif; }
        .vendas-grid { display: flex; gap: 20px; margin-top: 20px; }
        .venda-card { flex: 1; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .preview-card { flex: 1; background: #fff; padding: 20px; border-radius: 8px; border: 2px dashed #999; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .produto-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .produto-row select, .produto-row input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; }
        .totais-venda { margin: 20px 0; padding-top: 10px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; }
        .btn-adicionar { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .btn-finalizar { background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-download { background: #17a2b8; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        .pdf-preview { background: #fdfdfd; padding: 15px; border: 1px solid #eee; min-height: 250px; }
        .preview-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .preview-total { margin-top: 15px; border-top: 2px solid #000; padding-top: 5px; }
        .badge-bonif { background: #ffc107; color: #000; padding: 2px 5px; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>

<div class="vendas-container">

    <div class="vendas-topo">
        <div>
            <h1>Nova Venda / Saída de Estoque</h1>
            <p>Registre movimentações comerciais, brindes e gere o recibo de entrega</p>
        </div>
    </div>

    <div class="vendas-grid">

        <div class="venda-card">
            <h2>Dados da Movimentação</h2>

            <div class="form-group">
                <label>Nome do Cliente</label>
                <input type="text" id="cliente_nome" placeholder="Digite o nome do cliente..." oninput="atualizarPreviewPDF()">
            </div>

            <div class="form-group">
                <label>Desconto Adicional na Venda (R$)</label>
                <input type="number" id="bonificacao_valor" value="0" min="0" step="0.01" oninput="atualizarPreviewPDF()">
            </div>

            <h3>Itens do Pedido</h3>
            <div id="lista-produtos-venda"></div>

            <button class="btn-adicionar" onclick="adicionarProdutoVenda()">
                + Adicionar Item
            </button>

            <div class="totais-venda">
                <div>
                    <span>Total Bruto:</span>
                    <strong id="valor_total_venda">R$ 0,00</strong>
                </div>
                <div>
                    <span>Total a Pagar:</span>
                    <strong id="valor_final_venda">R$ 0,00</strong>
                </div>
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">
                Finalizar e Descontar Estoque
            </button>
        </div>

        <div class="preview-card">
            <div class="preview-topo">
                <h2>Visualização Prévia do Recibo</h2>
            </div>

            <div class="pdf-preview" id="pdf-preview"></div>

            <button class="btn-download" onclick="baixarPDFVenda()">
                Imprimir / Gerar PDF
            </button>
        </div>

    </div>

</div>

    <script src="./vendas.js"></script>
</body>
</html>
